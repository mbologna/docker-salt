rest_cherrypy:
  port: 9080
  disable_ssl: True

# Salt 3006+ disables all netapi clients by default. Re-enable the clients that
# salt-netapi-client (and the netapi in general) relies on. Without this the API
# returns "Client disabled: 'local'. Add to 'netapi_enable_clients' ...".
netapi_enable_clients:
  - local
  - local_async
  - local_batch
  - local_subset
  - runner
  - runner_async
  - wheel
  - wheel_async
  - ssh

external_auth:
  pam:
    saltdev:
      - .*
      - '@wheel'   # to allow access to all wheel modules
      - '@runner'  # to allow access to all runner modules
      - '@jobs'    # to allow access to the jobs runner and/or wheel module
