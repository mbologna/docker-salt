name: Build and Push

# This workflow uses a custom implementation instead of mbologna/.github's docker-ci.yml
# because this project has unique requirements:
# - Two separate Dockerfiles (master and minion)
# - Salt version extraction for dynamic image tagging (e.g., 3007, 3007.2)
# The reusable workflow doesn't currently support custom Dockerfile paths or version extraction.

on:
  push:
    branches:
      - master
      - main
    tags:
      - "v*"
  pull_request:
  schedule:
    - cron: "0 4 * * 0"

permissions:
  contents: read

# The Docker Hub namespace the images are published under. Must stay "mbologna"
# so existing consumers (e.g. SUSE/salt-netapi-client) keep working.
env:
  IMAGE_NAMESPACE: mbologna

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Hadolint (master)
        uses: hadolint/hadolint-action@2332a7b74a6de0dda2e2221d575162eba76ba5e5 # v3.3.0
        with:
          dockerfile: Dockerfile-master
          failure-threshold: error

      - name: Hadolint (minion)
        uses: hadolint/hadolint-action@2332a7b74a6de0dda2e2221d575162eba76ba5e5 # v3.3.0
        with:
          dockerfile: Dockerfile-minion
          failure-threshold: error

      - name: yamllint
        uses: ibiqlik/action-yamllint@2576378a8e339169678f9939646ee3ee325e845c # v3
        with:
          file_or_dir: .github/workflows/ docker-compose.yml
          config_data: |
            extends: default
            rules:
              line-length:
                max: 160
                level: warning
              truthy:
                allowed-values: ['true', 'false', 'on', 'off', 'yes', 'no']
              document-start: disable
              new-line-at-end-of-file: disable

  test:
    name: Integration test
    runs-on: ubuntu-latest
    needs: lint
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Run integration tests
        run: ./scripts/integration-test.sh

  build:
    name: Build ${{ matrix.image }}
    runs-on: ubuntu-latest
    needs: [lint, test]
    permissions:
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: saltstack-master
            dockerfile: Dockerfile-master
            bin: salt-master
          - image: saltstack-minion
            dockerfile: Dockerfile-minion
            bin: salt-minion
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4
      - name: Login to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build image locally (for Salt version extraction)
        id: buildload
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64
          load: true
          tags: localbuild/${{ matrix.image }}:ci
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,scope=${{ matrix.image }},mode=max

      - name: Extract Salt version
        id: saltver
        run: |
          ver="$(docker run --rm --entrypoint ${{ matrix.bin }} \
            localbuild/${{ matrix.image }}:ci --version | awk '{print $2}')"
          echo "version=${ver}" >> "$GITHUB_OUTPUT"
          echo "major=${ver%%.*}" >> "$GITHUB_OUTPUT"
          echo "Detected Salt version: ${ver} (major ${ver%%.*})"

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6
        with:
          images: docker.io/${{ env.IMAGE_NAMESPACE }}/${{ matrix.image }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ steps.saltver.outputs.version }},enable={{is_default_branch}}
            type=raw,value=${{ steps.saltver.outputs.major }},enable={{is_default_branch}}
            type=sha,prefix=sha-
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push
        id: build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,scope=${{ matrix.image }},mode=max

      - name: Scan image with Trivy
        if: github.event_name != 'pull_request'
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: docker.io/${{ env.IMAGE_NAMESPACE }}/${{ matrix.image }}@${{ steps.build.outputs.digest }}
          format: sarif
          output: trivy-${{ matrix.image }}.sarif
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL,HIGH,MEDIUM
          timeout: 10m

      - name: Upload Trivy SARIF
        if: github.event_name != 'pull_request' && hashFiles(format('trivy-{0}.sarif', matrix.image)) != ''
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4
        with:
          sarif_file: trivy-${{ matrix.image }}.sarif
          category: trivy-${{ matrix.image }}

  cache-cleanup:
    if: github.event_name == 'schedule'
    uses: mbologna/.github/.github/workflows/cache-cleanup.yml@7db69c646b42efd904a52154bf076a5912397c45 # main
    with:
      max_age_days: 7
    permissions:
      actions: write
