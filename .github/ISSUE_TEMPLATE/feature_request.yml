name: Feature Request
description: Suggest an idea for this project
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature!

        **Note:** These images are test fixtures for salt-netapi-client. Features should align with that purpose.
        The [stable contract](../README.md#compatibility-with-salt-netapi-client) must be preserved.

  - type: textarea
    id: problem
    attributes:
      label: Problem or Use Case
      description: Is your feature request related to a problem? Please describe the use case.
      placeholder: "I'm testing X and find it frustrating when..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the solution you'd like to see.
      placeholder: "Add support for..."
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Have you considered any alternative solutions or workarounds?

  - type: checkboxes
    id: stable-contract
    attributes:
      label: Stable Contract Compatibility
      description: Does this feature request respect the stable contract with salt-netapi-client?
      options:
        - label: This feature does not change image names, ports, authentication, or minion key handling
          required: true
        - label: I have read the [compatibility section](../README.md#compatibility-with-salt-netapi-client) in the README

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Add any other context, screenshots, or examples about the feature request.
